# SPA static hosting + API reverse proxy for the production frontend image.
server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Forward API calls to the backend service on the internal network.
    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # First hop = the real client; the backend's rate limiter reads this.
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: every other path serves index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
