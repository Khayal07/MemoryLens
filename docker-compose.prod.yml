# Production stack. Differs from docker-compose.yml (development) in the ways that
# matter for a public deployment:
#   - Postgres/Redis are NOT published to the host (internal network only).
#   - No `--reload`; the API runs the image's production CMD.
#   - Frontend is a built static bundle served by nginx, not the Vite dev server.
#   - Secrets come from the environment; there are no baked-in defaults.
#
# Usage:
#   cp .env.example .env.prod   # then fill in STRONG secrets (see README "Deploying")
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
#
# Put a TLS-terminating reverse proxy (nginx/Caddy/Traefik) in front of the frontend
# service and only expose that. ENV=production makes the API require a real JWT_SECRET,
# hides /docs, and gates /metrics behind X-Metrics-Token.

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set a strong POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-memorylens}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set a strong REDIS_PASSWORD}"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: ./backend
    env_file: .env.prod
    environment:
      ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    # No volume mount, no --reload — uses the image's production CMD. Migrations still
    # run on start via a one-shot before the server (kept in the image entrypoint /
    # or run manually: docker compose -f docker-compose.prod.yml run --rm api alembic upgrade head).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    depends_on:
      - api
    ports:
      - "8080:8080"   # front this with your TLS reverse proxy
    restart: unless-stopped

volumes:
  pgdata:
